<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITPlugin Resource Pack</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: #a0a0a0;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .download-btn {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }
        .sha1 {
            margin-top: 2rem;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .sha1-label {
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ITPlugin Resource Pack</h1>
        <p>
            Download the custom resource pack for ITPlugin. This pack includes custom pixel-art icons 
            for the in-game GUI and enhances your Minecraft server experience.
        </p>
        <a href="/ITPlugin-ResourcePack.zip" class="download-btn" download>
            Download Resource Pack
        </a>
        <div class="sha1">
            <div class="sha1-label">SHA1 Hash:</div>
            9972e33cfa916c26dcf4ba4b8deb0ab3dbd3f1e7
        </div>
    </div>
</body>
</html>
