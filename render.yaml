databases:
  - name: itplugin-db
    plan: free
    databaseName: itplugin
    user: itplugin
services:
  - type: web
    name: itplugin-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >-
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: itplugin-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: ""   # fill in after dashboard is deployed
  - type: web
    name: itplugin-dashboard
    runtime: static
    plan: free
    rootDir: .
    buildCommand: >-
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      BASE_PATH=/ pnpm --filter @workspace/dashboard run build
    staticPublishPath: artifacts/dashboard/dist/public
    envVars:
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: ""   # fill in after API service is deployed
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  - type: web
    name: itplugin-resourcepack
    runtime: static
    plan: free
    rootDir: resource-pack-hosting
    buildCommand: echo "static — no build needed"
    staticPublishPath: .
