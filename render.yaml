databases:
  - name: itplugin-db
    plan: free
    databaseName: itplugin
    user: itplugin
services:
  - type: web
    name: itplugin-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >-
      npx pnpm@latest install --frozen-lockfile &&
      npx pnpm@latest --filter './lib/*' run build &&
      npx pnpm@latest --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: itplugin-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: ""   # fill in after dashboard is deployed
  - type: web
    name: itplugin-dashboard
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >-
      npx pnpm@latest install --frozen-lockfile &&
      npx pnpm@latest --filter './lib/*' run build &&
      BASE_PATH=/ npx pnpm@latest --filter @workspace/dashboard run build
    startCommand: node artifacts/dashboard/dist/server.js
    envVars:
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: ""   # fill in after API service is deployed
  - type: web
    name: itplugin-resourcepack
    runtime: node
    plan: free
    rootDir: resource-pack-hosting
    buildCommand: >-
      npx pnpm@latest install --frozen-lockfile &&
      npx pnpm@latest --filter @workspace/resource-pack-hosting run build
    startCommand: node dist/server.js
